get:
  summary: Get publication detail
  description: >
    Returns a publication's detail. Only members of the publication's group can access it.
    For non-administrators, the publication is only visible if at least one of its authors
    (creator or co-authors) has not hidden their publication history from the requester;
    otherwise it is reported as not found.
  operationId: getPublicationDetail
  tags:
    - Publications
  parameters:
    - name: publicationId
      in: path
      required: true
      description: Unique identifier of the publication.
      schema:
        type: string
        format: uuid
  responses:
    "200":
      description: Publication detail retrieved successfully.
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/schemas/PublicationResponse"
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. The user is not a member of the publication's group.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Publication not found, or hidden from the requester.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"

delete:
  summary: Delete a publication
  description: >-
    Permanently delete a publication, including its authors and status history.
    The deletion is irreversible. Only the creator or an associated internal
    author can perform this action.
  operationId: deletePublication
  tags:
    - Publications
  parameters:
    - name: publicationId
      in: path
      required: true
      description: Unique identifier of the publication.
      schema:
        type: string
        format: uuid
  responses:
    "204":
      description: Publication deleted successfully.
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. User is neither the creator nor an associated author.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Publication not found.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"

put:
  summary: Update a publication
  description: >-
    Update the editable fields of a publication (title, abstract, author list and,
    when the publication is PUBLISHED, its DOI). The associated journal/group and
    status cannot be changed from here. Only the creator or an associated author
    can perform this action.
  operationId: updatePublication
  tags:
    - Publications
  parameters:
    - name: publicationId
      in: path
      required: true
      description: Unique identifier of the publication.
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./components.yaml#/schemas/UpdatePublicationRequest"
  responses:
    "200":
      description: Publication updated successfully.
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/schemas/PublicationResponse"
    "400":
      description: Bad request. Invalid input data.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. User is neither the creator nor an associated author.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Publication not found.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
