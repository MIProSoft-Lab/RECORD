schemas:
  PublicationStatus:
    type: string
    description: "Estado del ciclo de vida de la publicación."
    enum:
      - PLANNED
      - SUBMITTED
      - UNDER_REVIEW
      - MINOR_REVISION
      - MAJOR_REVISION
      - REJECTED
      - ACCEPTED
      - PUBLISHED
    example: "PLANNED"

  CreatePublicationRequest:
    type: object
    properties:
      title:
        type: string
        minLength: 1
        maxLength: 512
        description: "Título de la publicación. Obligatorio."
        example: "Deep learning approaches for medical imaging"
      groupId:
        type: string
        format: uuid
        description: "Grupo de investigación al que pertenece la publicación. El creador debe ser miembro."
      journalId:
        type: string
        format: uuid
        description: "Journal al que se asocia la publicación."
      abstract:
        type: string
        maxLength: 5000
        description: "Resumen de la publicación."
      doi:
        type: string
        maxLength: 255
        description: "DOI de la publicación. Solo permitido cuando el estado es PUBLISHED."
        example: "10.1000/xyz123"
      status:
        $ref: "#/schemas/PublicationStatus"
        description: "Estado inicial. Si se omite, por defecto es PLANNED."
      authors:
        type: array
        description: "Co-autores de la publicación, en orden. El creador se añade siempre como primer autor interno."
        items:
          $ref: "#/schemas/PublicationAuthorInput"
    required:
      - title
      - groupId
      - journalId

  UpdatePublicationRequest:
    type: object
    description: >-
      Campos editables de una publicación. El journal/grupo y el estado no se
      pueden modificar desde aquí. El DOI solo puede establecerse cuando la
      publicación está en estado PUBLISHED.
    properties:
      title:
        type: string
        minLength: 1
        maxLength: 512
        description: "Título de la publicación. Obligatorio."
        example: "Deep learning approaches for medical imaging"
      abstract:
        type: string
        maxLength: 5000
        description: "Resumen de la publicación."
      doi:
        type: string
        maxLength: 255
        description: "DOI de la publicación. Solo permitido cuando el estado es PUBLISHED."
        example: "10.1000/xyz123"
      authors:
        type: array
        description: "Co-autores de la publicación, en orden. El creador se mantiene siempre como autor interno."
        items:
          $ref: "#/schemas/PublicationAuthorInput"
    required:
      - title

  ChangePublicationStatusRequest:
    type: object
    description: >-
      Nuevo estado de la publicación. Solo se permiten transiciones válidas del
      ciclo de vida de la publicación.
    properties:
      status:
        $ref: "#/schemas/PublicationStatus"
        description: "Estado destino al que se quiere transicionar la publicación."
      comment:
        type: string
        maxLength: 2000
        description: "Comentario opcional asociado a la transición de estado."
    required:
      - status

  ResubmitPublicationRequest:
    type: object
    description: >-
      Reenvío de una publicación rechazada a otro journal. Solo aplica a
      publicaciones en estado REJECTED y el journal destino debe ser distinto
      del actual.
    properties:
      journalId:
        type: string
        format: uuid
        description: "Journal destino al que se reenvía la publicación. Debe ser distinto del actual."
      comment:
        type: string
        maxLength: 2000
        description: "Comentario opcional asociado al reenvío."
    required:
      - journalId

  PublicationAuthorType:
    type: string
    description: "Tipo de autor: interno (usuario registrado) o externo (no registrado)."
    enum:
      - INTERNAL
      - EXTERNAL

  PublicationAuthorInput:
    type: object
    description: >-
      Autor de entrada. Para un co-autor interno se indica únicamente userId;
      para un co-autor externo se indican firstName y lastName.
    properties:
      userId:
        type: string
        format: uuid
        description: "Identificador del usuario registrado (co-autor interno)."
      firstName:
        type: string
        maxLength: 255
        description: "Nombre del co-autor externo."
      lastName:
        type: string
        maxLength: 255
        description: "Apellidos del co-autor externo."

  PublicationAuthorResponse:
    type: object
    description: "Autor de una publicación, interno (usuario registrado) o externo."
    properties:
      authorId:
        type: string
        format: uuid
        description: "Identificador de la entrada de autoría dentro de la publicación."
      type:
        $ref: "#/schemas/PublicationAuthorType"
      userId:
        type: string
        format: uuid
        description: "Identificador del usuario registrado. Solo presente en autores internos."
      firstName:
        type: string
      lastName:
        type: string
      email:
        type: string
        format: email
        description: "Solo presente en autores internos."
      profileImageUrl:
        type: string
        description: "URL de la imagen de perfil. Solo presente en autores internos."
    required:
      - authorId
      - type
      - firstName
      - lastName

  PublicationStatusHistoryEntry:
    type: object
    description: >-
      Entrada del historial de estados de una publicación. Representa el momento
      en que la publicación pasó a un estado concreto, junto con el journal
      asociado en ese momento (útil para reflejar el journal anterior en un
      reenvío) y un comentario opcional.
    properties:
      status:
        $ref: "#/schemas/PublicationStatus"
      journalId:
        type: string
        format: uuid
        description: "Journal asociado a la publicación en el momento de esta transición."
      journalName:
        type: string
        description: "Nombre del journal asociado en el momento de esta transición."
      changedAt:
        type: string
        format: date-time
        description: "Fecha y hora en que la publicación pasó a este estado."
      comment:
        type: string
        description: "Comentario opcional asociado a la transición."
    required:
      - status
      - journalId
      - changedAt

  PublicationResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      groupId:
        type: string
        format: uuid
      journalId:
        type: string
        format: uuid
      journalName:
        type: string
        description: "Nombre del journal asociado."
      abstract:
        type: string
      doi:
        type: string
      status:
        $ref: "#/schemas/PublicationStatus"
      createdBy:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      authors:
        type: array
        description: "Autores internos de la publicación (incluye al creador)."
        items:
          $ref: "#/schemas/PublicationAuthorResponse"
      statusHistory:
        type: array
        description: "Historial de estados en orden cronológico ascendente."
        items:
          $ref: "#/schemas/PublicationStatusHistoryEntry"
    required:
      - id
      - title
      - groupId
      - journalId
      - status
      - createdBy
      - createdAt
      - statusHistory

  PublicationListPageResponse:
    type: object
    description: "Página de resultados del historial de publicaciones."
    properties:
      content:
        type: array
        items:
          $ref: "#/schemas/PublicationSummaryResponse"
      totalElements:
        type: integer
        format: int64
        description: "Número total de publicaciones que cumplen los filtros."
        example: 42
      totalPages:
        type: integer
        description: "Número total de páginas."
        example: 3
      page:
        type: integer
        description: "Índice de página actual (base 0)."
        example: 0
      size:
        type: integer
        description: "Tamaño de página solicitado."
        example: 20
    required:
      - content
      - totalElements
      - totalPages
      - page
      - size

  PublicationSummaryResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      groupId:
        type: string
        format: uuid
      journalId:
        type: string
        format: uuid
      journalName:
        type: string
        description: "Nombre del journal asociado."
      status:
        $ref: "#/schemas/PublicationStatus"
      createdAt:
        type: string
        format: date-time
      statusChangedAt:
        type: string
        format: date-time
        description: "Fecha en que la publicación pasó a su estado actual."
    required:
      - id
      - title
      - groupId
      - journalId
      - status
      - createdAt
      - statusChangedAt

  PublicationCreatorResponse:
    type: object
    description: "Creador (dueño) de la publicación."
    properties:
      userId:
        type: string
        format: uuid
      firstName:
        type: string
      lastName:
        type: string
      profileImageUrl:
        type: string
        description: "URL de la imagen de perfil del creador."
    required:
      - userId
      - firstName
      - lastName

  GroupPublicationSummaryResponse:
    type: object
    description: >-
      Publicación dentro del listado de un grupo. Igual que PublicationSummaryResponse
      pero enriquecida con el creador (dueño) para mostrar de quién es cada publicación.
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      groupId:
        type: string
        format: uuid
      journalId:
        type: string
        format: uuid
      journalName:
        type: string
        description: "Nombre del journal asociado."
      status:
        $ref: "#/schemas/PublicationStatus"
      createdAt:
        type: string
        format: date-time
      statusChangedAt:
        type: string
        format: date-time
        description: "Fecha en que la publicación pasó a su estado actual."
      creator:
        $ref: "#/schemas/PublicationCreatorResponse"
    required:
      - id
      - title
      - groupId
      - journalId
      - status
      - createdAt
      - statusChangedAt
      - creator

  GroupPublicationListPageResponse:
    type: object
    description: "Página de resultados del listado de publicaciones de un grupo."
    properties:
      content:
        type: array
        items:
          $ref: "#/schemas/GroupPublicationSummaryResponse"
      totalElements:
        type: integer
        format: int64
        description: "Número total de publicaciones que cumplen los filtros."
        example: 42
      totalPages:
        type: integer
        description: "Número total de páginas."
        example: 3
      page:
        type: integer
        description: "Índice de página actual (base 0)."
        example: 0
      size:
        type: integer
        description: "Tamaño de página solicitado."
        example: 20
    required:
      - content
      - totalElements
      - totalPages
      - page
      - size
