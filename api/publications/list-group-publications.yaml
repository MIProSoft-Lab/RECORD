get:
  summary: List the publications of a research group
  description: >
    Devuelve una página de las publicaciones que pertenecen al grupo (de todos sus
    miembros). Disponible solo para miembros del grupo. El filtro `memberIds`
    permite acotar el listado a las publicaciones en las que esos miembros figuran
    como autores (creador o co-autor); si se omite, se incluyen las de todos los
    miembros. El resto de filtros son opcionales y combinables.
  operationId: listGroupPublications
  tags:
    - Publications
  parameters:
    - name: groupId
      in: path
      required: true
      description: "Identificador del grupo de investigación."
      schema:
        type: string
        format: uuid
    - name: memberIds
      in: query
      required: false
      description: >
        Miembros cuyas publicaciones se quieren incluir (el miembro figura como autor,
        creador o co-autor). Si se omite, se incluyen las publicaciones de todos los
        miembros del grupo.
      schema:
        type: array
        items:
          type: string
          format: uuid
    - name: title
      in: query
      required: false
      description: "Búsqueda parcial e insensible a mayúsculas por título de la publicación."
      schema:
        type: string
        minLength: 1
    - name: journalId
      in: query
      required: false
      description: "Filtra por el journal asociado a la publicación."
      schema:
        type: string
        format: uuid
    - name: status
      in: query
      required: false
      description: "Filtra por estado del ciclo de vida de la publicación."
      schema:
        $ref: "./components.yaml#/schemas/PublicationStatus"
    - name: minDaysInStatus
      in: query
      required: false
      description: >
        Solo publicaciones que llevan al menos N días en su estado actual (útil para
        detectar publicaciones estancadas sin respuesta). Cuando se aplica, se excluyen
        automáticamente las publicaciones en estado final (REJECTED, PUBLISHED).
      schema:
        type: integer
        minimum: 1
    - name: page
      in: query
      required: false
      description: "Índice de página (base 0)."
      schema:
        type: integer
        minimum: 0
        default: 0
    - name: size
      in: query
      required: false
      description: "Tamaño de página."
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    "200":
      description: Successfully retrieved the page of group publications
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/schemas/GroupPublicationListPageResponse"
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. The user is not a member of the group.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
