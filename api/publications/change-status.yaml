patch:
  summary: Change a publication's status
  description: >-
    Transition a publication to a new lifecycle status. Only transitions allowed
    by the publication state machine are accepted. Only the creator or an
    associated author can perform this action.
  operationId: changePublicationStatus
  tags:
    - Publications
  parameters:
    - name: publicationId
      in: path
      required: true
      description: Unique identifier of the publication.
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./components.yaml#/schemas/ChangePublicationStatusRequest"
  responses:
    "200":
      description: Publication status changed successfully.
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/schemas/PublicationResponse"
    "400":
      description: Bad request. Invalid input data.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. User is neither the creator nor an associated author.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Publication not found.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "409":
      description: Conflict. The requested status transition is not allowed from the current status.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
