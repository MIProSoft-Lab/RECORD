schemas:
  UserResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      firstName:
        type: string
        minLength: 2
        maxLength: 50
        example: "John"
      lastName:
        type: string
        minLength: 2
        maxLength: 100
        example: "Doe"
      email:
        type: string
        format: email
        minLength: 5
        maxLength: 254
        example: "john.doe@example.com"
      profileImageUrl:
        type: string
        example: "https://res.cloudinary.com/dngaan1ba/image/upload/v12345/user_profile_images/xxx.jpg"
      pushNotifications:
        type: boolean
        example: true
    required:
      - id
      - firstName
      - lastName
      - email
      - profileImageUrl
      - pushNotifications

  UserUpdateRequest:
    type: object
    properties:
      firstName:
        type: string
        minLength: 2
        maxLength: 50
        example: "John"
      lastName:
        type: string
        minLength: 2
        maxLength: 100
        example: "Doe"
      profileImageUrl:
        type: string
    required:
      - firstName
      - lastName

  UserProfileImageSignatureResponse:
    type: object
    properties:
      signature:
        type: string
      timestamp:
        type: string
      api_key:
        type: string
      cloud_name:
        type: string
      transformation:
        type: string
      folder:
        type: string
    required:
      - signature
      - timestamp
      - api_key
      - cloud_name
      - transformation
      - folder

  UserUpdatePushNotificationRequest:
    type: object
    properties:
      pushNotifications:
        type: boolean
        description: Whether push notifications are enabled for the user.
        example: true
    required:
      - pushNotifications
