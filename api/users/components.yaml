schemas:
  UserResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      firstName:
        type: string
        minLength: 2
        maxLength: 50
        example: "John"
      lastName:
        type: string
        minLength: 2
        maxLength: 100
        example: "Doe"
      email:
        type: string
        format: email
        minLength: 5
        maxLength: 254
        example: "john.doe@example.com"
    required:
      - id
      - firstName
      - lastName
      - email

  UserUpdateRequest:
    type: object
    properties:
      firstName:
        type: string
        minLength: 2
        maxLength: 50
        example: "John"
      lastName:
        type: string
        minLength: 2
        maxLength: 100
        example: "Doe"
    required:
      - firstName
      - lastName
