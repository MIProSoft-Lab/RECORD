get:
  summary: Search registered users by name or email
  operationId: searchUsers
  tags:
    - Users
  parameters:
    - name: query
      in: query
      required: true
      schema:
        type: string
        minLength: 2
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "./components.yaml#/schemas/UserSummaryResponse"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
