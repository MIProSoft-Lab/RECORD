put:
  summary: Update the current user
  operationId: updateCurrentUser
  tags:
    - Users
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./components.yaml#/schemas/UserUpdateRequest"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/schemas/UserResponse"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
