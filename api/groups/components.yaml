schemas:
  CreateGroupRequest:
    type: object
    properties:
      name:
        type: string
        minLength: 3
        maxLength: 255
        description: "El nombre del grupo de investigación. Debe ser único."
        example: "Inteligencia Artificial Aplicada"
      description:
        type: string
        maxLength: 2000
        description: "Descripción detallada de las actividades del grupo."
        example: "Grupo dedicado a la investigación de redes neuronales y machine learning."
    required:
      - name

  GroupResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      description:
        type: string
      createdBy:
        type: string
        format: uuid
    required:
      - id
      - name
      - createdBy

  GroupSummaryResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        description: "Group name."
      description:
        type: string
        description: "Group description."
      role:
        $ref: "../common.yaml#/schemas/GroupRole"
      memberCount:
        type: integer
        description: "Number of members in the group."
        example: 10
      isOwner:
        type: boolean
        description: "Whether the user is the owner of the group."
        example: false
    required:
      - id
      - name
      - role
      - memberCount
      - isOwner

  GroupDetailResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      description:
        type: string
      createdBy:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      members:
        type: array
        items:
          $ref: "#/schemas/GroupMemberDetail"
    required:
      - id
      - name
      - createdBy
      - createdAt
      - members

  GroupMemberDetail:
    type: object
    properties:
      userId:
        type: string
        format: uuid
        description: "Unique identifier of the user."
      firstName:
        type: string
        description: "First name of the user."
      lastName:
        type: string
        description: "Last name of the user."
      email:
        type: string
        format: email
        description: "Email of the user."
      role:
        $ref: "../common.yaml#/schemas/GroupRole"
      profileImageUrl:
        type: string
        description: "URL of the user's profile image."
      isCreator:
        type: boolean
        description: "Whether the user is the creator of the group."
        example: false
    required:
      - userId
      - firstName
      - lastName
      - email
      - role
      - profileImageUrl
      - isCreator

  InvitableUserResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: "Unique identifier of the user."
      firstName:
        type: string
        description: "First name of the user."
      lastName:
        type: string
        description: "Last name of the user."
      email:
        type: string
        format: email
        description: "Email of the user."
      profileImageUrl:
        type: string
        description: "URL of the user's profile image."
    required:
      - id
      - firstName
      - lastName
      - email
      - profileImageUrl

  SendInvitationRequest:
    type: object
    properties:
      inviteeUserId:
        type: string
        format: uuid
        description: "Unique identifier of the user to be invited."
    required:
      - inviteeUserId
