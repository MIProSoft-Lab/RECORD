schemas:
  CreateGroupRequest:
    type: object
    properties:
      name:
        type: string
        minLength: 3
        maxLength: 255
        description: "El nombre del grupo de investigación. Debe ser único."
        example: "Inteligencia Artificial Aplicada"
      description:
        type: string
        maxLength: 2000
        description: "Descripción detallada de las actividades del grupo."
        example: "Grupo dedicado a la investigación de redes neuronales y machine learning."
    required:
      - name

  UpdateGroupRequest:
    type: object
    properties:
      name:
        type: string
        minLength: 3
        maxLength: 255
        description: "El nombre del grupo de investigación. Debe ser único."
        example: "Inteligencia Artificial Aplicada"
      description:
        type: string
        maxLength: 2000
        description: "Descripción detallada de las actividades del grupo."
        example: "Grupo dedicado a la investigación de redes neuronales y machine learning."
    required:
      - name

  GroupResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      description:
        type: string
      createdBy:
        type: string
        format: uuid
    required:
      - id
      - name
      - createdBy

  GroupSummaryResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        description: "Group name."
      description:
        type: string
        description: "Group description."
      role:
        $ref: "../common.yaml#/schemas/GroupRole"
      memberCount:
        type: integer
        description: "Number of members in the group."
        example: 10
      isOwner:
        type: boolean
        description: "Whether the user is the owner of the group."
        example: false
    required:
      - id
      - name
      - role
      - memberCount
      - isOwner

  GroupDetailResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      description:
        type: string
      createdBy:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      members:
        type: array
        items:
          $ref: "#/schemas/GroupMemberDetail"
    required:
      - id
      - name
      - createdBy
      - createdAt
      - members

  GroupMemberDetail:
    type: object
    properties:
      userId:
        type: string
        format: uuid
        description: "Unique identifier of the user."
      firstName:
        type: string
        description: "First name of the user."
      lastName:
        type: string
        description: "Last name of the user."
      email:
        type: string
        format: email
        description: "Email of the user."
      role:
        $ref: "../common.yaml#/schemas/GroupRole"
      profileImageUrl:
        type: string
        description: "URL of the user's profile image."
      isCreator:
        type: boolean
        description: "Whether the user is the creator of the group."
        example: false
    required:
      - userId
      - firstName
      - lastName
      - email
      - role
      - profileImageUrl
      - isCreator

  InvitableUserResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: "Unique identifier of the user."
      firstName:
        type: string
        description: "First name of the user."
      lastName:
        type: string
        description: "Last name of the user."
      email:
        type: string
        format: email
        description: "Email of the user."
      profileImageUrl:
        type: string
        description: "URL of the user's profile image."
    required:
      - id
      - firstName
      - lastName
      - email
      - profileImageUrl

  SendInvitationRequest:
    type: object
    properties:
      inviteeUserId:
        type: string
        format: uuid
        description: "Unique identifier of the user to be invited."
    required:
      - inviteeUserId

  UpdateGroupMemberRoleRequest:
    type: object
    properties:
      role:
        $ref: "../common.yaml#/schemas/GroupRole"
        description: "The new role to assign to the group member."
    required:
      - role

  PublicationVisibilityMember:
    type: object
    description: >
      Otro miembro del grupo y si puede ver el historial de publicaciones del usuario actual.
    properties:
      userId:
        type: string
        format: uuid
        description: "Unique identifier of the member."
      firstName:
        type: string
        description: "First name of the member."
      lastName:
        type: string
        description: "Last name of the member."
      email:
        type: string
        format: email
        description: "Email of the member."
      role:
        $ref: "../common.yaml#/schemas/GroupRole"
      profileImageUrl:
        type: string
        description: "URL of the member's profile image."
      canSee:
        type: boolean
        description: "Whether this member can currently see the user's publication history."
        example: true
      locked:
        type: boolean
        description: >
          Whether visibility for this member cannot be changed (always true for group
          administrators, who can always see everything).
        example: false
    required:
      - userId
      - firstName
      - lastName
      - email
      - role
      - profileImageUrl
      - canSee
      - locked

  PublicationVisibilitySettingsResponse:
    type: object
    description: "Ajustes de visibilidad del historial de publicaciones del usuario actual."
    properties:
      members:
        type: array
        description: "Resto de miembros del grupo y su visibilidad sobre el usuario actual."
        items:
          $ref: "#/schemas/PublicationVisibilityMember"
    required:
      - members

  UpdatePublicationVisibilityRequest:
    type: object
    properties:
      canSee:
        type: boolean
        description: >
          Whether the member can see the user's publication history. false hides it, true
          restores the default visibility.
        example: true
    required:
      - canSee

  MembersHiddenFromMeResponse:
    type: object
    description: "Miembros que ocultan su historial de publicaciones al usuario actual."
    properties:
      hiddenMemberIds:
        type: array
        description: "Ids de los miembros cuyas publicaciones no se muestran al usuario actual."
        items:
          type: string
          format: uuid
    required:
      - hiddenMemberIds

  GroupJournalInterestMember:
    type: object
    description: "Miembro del grupo que ha marcado la revista como de interés."
    properties:
      userId:
        type: string
        format: uuid
        description: "Unique identifier of the member."
      firstName:
        type: string
        description: "First name of the member."
      lastName:
        type: string
        description: "Last name of the member."
      profileImageUrl:
        type: string
        description: "URL of the member's profile image."
    required:
      - userId
      - firstName
      - lastName
      - profileImageUrl

  GroupJournalInterestResponse:
    type: object
    description: "Revista marcada como de interés por uno o más miembros del grupo."
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        example: "CA-A Cancer Journal for Clinicians"
      issn:
        type: string
        example: "0007-9235"
      eIssn:
        type: string
        example: "1542-4863"
      publisherName:
        type: string
        example: "Wiley"
      year:
        type: integer
        description: "Año del informe del que provienen las categorías/cuartiles mostrados."
        example: 2023
      categories:
        type: array
        description: "Categorías/cuartiles de la revista en su último año disponible."
        items:
          $ref: "../journals/components.yaml#/schemas/JournalCategoryQuartileSummary"
      favoriteCount:
        type: integer
        description: "Número de miembros del grupo que han marcado esta revista como de interés."
        example: 3
      members:
        type: array
        description: "Miembros del grupo que han marcado esta revista como de interés."
        items:
          $ref: "#/schemas/GroupJournalInterestMember"
    required:
      - id
      - name
      - categories
      - favoriteCount
      - members

  GroupJournalInterestPageResponse:
    type: object
    description: "Página con la unión de revistas de interés de los miembros del grupo."
    properties:
      content:
        type: array
        items:
          $ref: "#/schemas/GroupJournalInterestResponse"
      totalElements:
        type: integer
        format: int64
        description: "Número total de revistas en la unión."
        example: 42
      totalPages:
        type: integer
        description: "Número total de páginas."
        example: 3
      page:
        type: integer
        description: "Índice de página actual (base 0)."
        example: 0
      size:
        type: integer
        description: "Tamaño de página solicitado."
        example: 20
    required:
      - content
      - totalElements
      - totalPages
      - page
      - size
