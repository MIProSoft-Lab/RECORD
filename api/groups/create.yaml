post:
  summary: Create a new research group
  operationId: createGroup
  tags:
    - Groups
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./components.yaml#/schemas/CreateGroupRequest"

  responses:
    "200":
      description: Group created successfully
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/schemas/GroupResponse"
    "400":
      description: Bad request (e.g., invalid data)
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "409":
      description: Group name already exists
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"