get:
  summary: "Lista la unión de revistas de interés de los miembros del grupo"
  description: >
    Devuelve una página con la unión deduplicada de las revistas marcadas como de
    interés por cualquier miembro del grupo, indicando cuántos miembros la han
    marcado y quiénes. Ordenada por número de miembros que la marcan (descendente).
    Las categorías/cuartiles devueltos corresponden al último año disponible de cada revista.
  operationId: getGroupJournalInterests
  tags:
    - Groups
  parameters:
    - name: groupId
      in: path
      required: true
      description: Unique identifier of the group.
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      required: false
      description: "Índice de página (base 0)."
      schema:
        type: integer
        minimum: 0
        default: 0
    - name: size
      in: query
      required: false
      description: "Tamaño de página."
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "./components.yaml#/schemas/GroupJournalInterestPageResponse"
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. User is not a member of the group.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Group not found.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
