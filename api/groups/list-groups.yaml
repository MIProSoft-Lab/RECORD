get:
  summary: List all groups that the user is a member of
  operationId: listGroups
  tags:
    - Groups
  responses:
    "200":
      description: Successfully retrieved the list of groups
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "./components.yaml#/schemas/GroupSummaryResponse"
    "400":
      description: Bad request. Invalid input data.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
