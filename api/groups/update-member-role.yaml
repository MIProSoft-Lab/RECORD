patch:
  summary: Update a group member's role
  description: Update the role of a member of a group. Only group administrators can perform this action. The last administrator of a group cannot be downgraded.
  operationId: updateGroupMemberRole
  tags:
    - Groups
  parameters:
    - name: groupId
      in: path
      required: true
      description: Unique identifier of the group.
      schema:
        type: string
        format: uuid
    - name: memberId
      in: path
      required: true
      description: Unique identifier of the group member whose role is being updated.
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./components.yaml#/schemas/UpdateGroupMemberRoleRequest"
  responses:
    "204":
      description: Member role updated successfully.
    "400":
      description: Bad request. Invalid input data.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. The acting user is not a member of the group, is not an administrator, or the target user is not a member of the group.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Group not found.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "409":
      description: Conflict. The target member is the last administrator of the group and cannot be downgraded.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
