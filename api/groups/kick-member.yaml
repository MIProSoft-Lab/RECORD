delete:
  summary: Kick a member from a group
  description: Remove a member from a group. Only group administrators can perform this action. The last administrator of a group cannot be kicked.
  operationId: kickGroupMember
  tags:
    - Groups
  parameters:
    - name: groupId
      in: path
      required: true
      description: Unique identifier of the group.
      schema:
        type: string
        format: uuid
    - name: memberId
      in: path
      required: true
      description: Unique identifier of the group member to kick.
      schema:
        type: string
        format: uuid
  responses:
    "204":
      description: Member kicked successfully.
    "401":
      description: Unauthorized. User not authenticated.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "403":
      description: Forbidden. The acting user is not a member of the group, is not an administrator, or the target user is not a member of the group.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "404":
      description: Group not found.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "409":
      description: Conflict. The target member is the last administrator of the group and cannot be kicked.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../common.yaml#/schemas/ErrorResponse"
