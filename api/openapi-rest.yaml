openapi: 3.0.3
info:
  title: REST API for RECORD
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /auth/login:
    $ref: "./auth/login.yaml"

  /auth/register:
    $ref: "./auth/register.yaml"

  /auth/refresh:
    $ref: "./auth/refresh.yaml"

  /auth/logout:
    $ref: "./auth/logout.yaml"

  /users/me:
    $ref: "./users/get-user.yaml"

  /users/me/update:
    $ref: "./users/update-user.yaml"
