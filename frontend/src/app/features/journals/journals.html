<div class="surface-ground p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <h1 class="m-0">{{ 'JOURNALS.TITLE' | translate }}</h1>
  </div>

  <p-tabs value="search" (valueChange)="onTabChange($event)">
    <p-tablist>
      <p-tab value="search">{{ 'JOURNALS.TABS.SEARCH' | translate }}</p-tab>
      <p-tab value="interests">{{ 'JOURNALS.TABS.INTERESTS' | translate }}</p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="search">
        <record-journal-list mode="search" />
      </p-tabpanel>
      <p-tabpanel value="interests">
        <record-journal-list mode="interests" />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
